name: "CodeQL Analysis"

on:
  workflow_call:
    inputs:
      languages:
        required: false
        type: string
        default: "c-cpp"
        description: "Languages to analyze (comma-separated)"
      build_mode:
        required: false
        type: string
        default: "none"
        description: "CodeQL build mode (none, manual, autobuild)"
      repo:
        required: false
        type: string
        default: ""
        description: "Repository to analyze (defaults to calling repo)"
      branch:
        required: false
        type: string
        default: ""
        description: "Branch to analyze (defaults to calling branch)"

jobs:
  analyze:
    name: Analyze (${{ inputs.languages }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo || github.repository }}
          ref: ${{ inputs.branch || github.ref }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.languages }}
          build-mode: ${{ inputs.build_mode }}

      - name: Download and setup metaport
        run: |
          sudo apt-get update
          sudo apt-get install -y pax ncompress curl

      - name: Setup meta and build with zopen
        run: |
          # Clone meta repository
          git clone https://github.com/zopencommunity/meta.git
          echo "Metaport setup completed"
          
          cd meta
          export PATH="$PWD/bin:$PATH"
          cd -
          
          # Configure git
          git config --global user.email "zopenCommunity@ibm.com"
          git config --global user.name "Zopen Community"
          
          # Build the project
          echo "Building project..."
          zopen build -g
          ls -lrt

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ inputs.languages }}"
